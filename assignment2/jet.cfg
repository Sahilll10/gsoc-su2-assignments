% ---- SOLVER ----
SOLVER= INC_RANS
KIND_TURB_MODEL= SST
AXISYMMETRIC= YES

% ---- INCOMPRESSIBLE FREE-STREAM ----
INC_DENSITY_MODEL= CONSTANT
INC_ENERGY_EQUATION= NO
INC_DENSITY_INIT= 1.225
INC_VELOCITY_INIT= (1.0, 0.0, 0.0)
INC_NONDIM= DIMENSIONAL

% ---- FLUID PROPERTIES ----
FLUID_MODEL= CONSTANT_DENSITY
VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 1.789e-5

% ---- NUMERICS ----
NUM_METHOD_GRAD= GREEN_GAUSS
CFL_NUMBER= 25.0
CFL_ADAPT= YES
CFL_ADAPT_PARAM= (0.1, 2.0, 10.0, 1000.0, 0.001)
LINEAR_SOLVER= FGMRES
LINEAR_SOLVER_PREC= ILU
LINEAR_SOLVER_ERROR= 1E-10
LINEAR_SOLVER_ITER= 10

% ---- CONVECTIVE SCHEME ----
CONV_NUM_METHOD_FLOW= FDS
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= NONE
CONV_NUM_METHOD_TURB= SCALAR_UPWIND
MUSCL_TURB= NO

% ---- BOUNDARY CONDITIONS ----
INC_INLET_TYPE= VELOCITY_INLET VELOCITY_INLET
INC_OUTLET_TYPE= PRESSURE_OUTLET PRESSURE_OUTLET
MARKER_INLET= (inlet, 0.0, 50.0, 1.0, 0.0, 0.0, \
               inlet_coflow, 0.0, 0.5, 1.0, 0.0, 0.0)
MARKER_OUTLET= (outlet, 0.0, outlet_coflow, 0.0)
MARKER_SYM= (symmetry)
MARKER_FAR= (farfield)

% ---- CONVERGENCE ----
CONV_FIELD= RMS_PRESSURE
CONV_RESIDUAL_MINVAL= -12
CONV_STARTITER= 10
ITER= 10000

% ---- INPUT/OUTPUT ----
MESH_FILENAME= jet.su2
MESH_FORMAT= SU2
SOLUTION_FILENAME= solution_jet
RESTART_FILENAME= restart_jet
OUTPUT_FILES= (PARAVIEW, RESTART)
OUTPUT_WRT_FREQ= 500
SCREEN_OUTPUT= (INNER_ITER, RMS_PRESSURE, RMS_VELOCITY-X, LIFT, DRAG)
VOLUME_OUTPUT= (PRIMITIVE, RESIDUAL)
CONV_FILENAME= history
